<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect Apple Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Instrument+Serif&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-hover: #1c1c1c;
      --border: #2a2a2a;
      --text: #f5f5f5;
      --text-muted: #888;
      --apple-pink: #fc3c44;
      --apple-pink-glow: rgba(252, 60, 68, 0.25);
      --apple-gradient: linear-gradient(135deg, #fc3c44, #d63384, #a855f7);
      --success: #34d399;
      --radius: 14px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -40%; left: -20%;
      width: 80vw; height: 80vw;
      background: radial-gradient(circle, rgba(252,60,68,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -30%; right: -20%;
      width: 70vw; height: 70vw;
      background: radial-gradient(circle, rgba(168,85,247,0.05) 0%, transparent 70%);
      pointer-events: none;
    }
    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px; padding: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 36px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    }
    .icon-wrapper {
      width: 80px; height: 80px;
      margin: 0 auto 28px;
      border-radius: 22px;
      background: var(--apple-gradient);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 32px var(--apple-pink-glow);
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .icon-wrapper svg { width: 40px; height: 40px; fill: white; }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 28px; font-weight: 400;
      letter-spacing: -0.02em; margin-bottom: 10px;
    }
    .subtitle {
      color: var(--text-muted);
      font-size: 14px; line-height: 1.6;
      margin-bottom: 36px;
      max-width: 320px; margin-left: auto; margin-right: auto;
    }
    .btn-connect {
      width: 100%; padding: 16px 24px;
      border: none; border-radius: var(--radius);
      background: var(--apple-gradient);
      color: white; font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 600;
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px var(--apple-pink-glow);
    }
    .btn-connect:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px var(--apple-pink-glow);
    }
    .btn-connect:active:not(:disabled) { transform: translateY(0); }
    .btn-connect:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-connect .btn-content {
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-connect .btn-content svg { width: 18px; height: 18px; fill: white; }
    .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-connect.loading .btn-content { display: none; }
    .btn-connect.loading .spinner { display: block; }
    .status {
      margin-top: 20px; padding: 12px 16px;
      border-radius: 10px; font-size: 13px;
      line-height: 1.5; display: none;
    }
    .status.error {
      display: block;
      background: rgba(252,60,68,0.1);
      border: 1px solid rgba(252,60,68,0.2);
      color: #fc3c44;
    }
    .status.success {
      display: block;
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.2);
      color: var(--success);
    }
    .status.info {
      display: block;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .connected-badge {
      display: none; align-items: center; justify-content: center;
      gap: 8px; padding: 14px 24px; border-radius: var(--radius);
      background: rgba(52,211,153,0.08);
      border: 1px solid rgba(52,211,153,0.2);
      color: var(--success); font-size: 14px; font-weight: 500;
    }
    .connected-badge svg {
      width: 18px; height: 18px;
      stroke: var(--success); fill: none;
    }
    .footer {
      margin-top: 24px; font-size: 12px;
      color: var(--text-muted); line-height: 1.5; opacity: 0.6;
    }
    .auth-prompt {
      display: none; text-align: center; padding: 16px;
      margin-bottom: 16px; border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
    }
    .auth-prompt p { color: var(--text-muted); font-size: 13px; margin-bottom: 12px; }
    .btn-signin {
      padding: 10px 20px; border: 1px solid var(--border);
      border-radius: 10px; background: transparent;
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-signin:hover { background: var(--surface-hover); border-color: #3a3a3a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="icon-wrapper">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M19.5 2.29a1 1 0 0 0-.79-.21l-10 2A1 1 0 0 0 8 5.05v9.45a3.5 3.5 0 1 0 2 3.17V10.1l8-1.6v4a3.5 3.5 0 1 0 2 3.17V3.05a1 1 0 0 0-.5-.76ZM6.5 19.67a1.5 1.5 0 1 1 1.5-1.5 1.5 1.5 0 0 1-1.5 1.5Zm10-2a1.5 1.5 0 1 1 1.5-1.5 1.5 1.5 0 0 1-1.5 1.5Z"/>
        </svg>
      </div>
      <h1>Connect Apple Music</h1>
      <p class="subtitle">Link your Apple Music account to start tracking your listening history.</p>
      <div class="auth-prompt" id="authPrompt">
        <p>You need to be signed in first.</p>
        <button class="btn-signin" id="signinBtn">Sign in with Apple</button>
      </div>
      <button class="btn-connect" id="connectBtn">
        <span class="btn-content">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.5 2.29a1 1 0 0 0-.79-.21l-10 2A1 1 0 0 0 8 5.05v9.45a3.5 3.5 0 1 0 2 3.17V10.1l8-1.6v4a3.5 3.5 0 1 0 2 3.17V3.05a1 1 0 0 0-.5-.76ZM6.5 19.67a1.5 1.5 0 1 1 1.5-1.5 1.5 1.5 0 0 1-1.5 1.5Zm10-2a1.5 1.5 0 1 1 1.5-1.5 1.5 1.5 0 0 1-1.5 1.5Z"/>
          </svg>
          Connect Apple Music
        </span>
        <div class="spinner"></div>
      </button>
      <div class="connected-badge" id="connectedBadge">
        <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        Apple Music Connected
      </div>
      <div class="status" id="status"></div>
      <p class="footer">We only read your recently played tracks. You can disconnect at any time.</p>
    </div>
  </div>

  <!-- Load Supabase first -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- Load MusicKit with the musickitloaded event listener -->
  <script>
    document.addEventListener('musickitloaded', function() {
      console.log('MusicKit JS loaded and ready');
      window._musicKitReady = true;
    });
  </script>
  <script src="https://js-cdn.music.apple.com/musickit/v3/musickit.js" crossorigin></script>

  <script>
    (function() {
      var SUPA_URL = 'https://pslwpsasjbaznhjqhowq.supabase.co';
      var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzbHdwc2FzamJhem5oanFob3dxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0NjU3MDUsImV4cCI6MjA4MTA0MTcwNX0.OGI6PAcF_FCxY9IMuXDvouHuffjm5uSA-wiHjjWEmb4';

      var sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
      var connectBtn = document.getElementById('connectBtn');
      var connectedBadge = document.getElementById('connectedBadge');
      var statusEl = document.getElementById('status');
      var authPrompt = document.getElementById('authPrompt');
      var signinBtn = document.getElementById('signinBtn');
      var currentSession = null;

      function showStatus(type, message) {
        statusEl.className = 'status ' + type;
        statusEl.textContent = message;
        console.log('[Status ' + type + ']', message);
      }

      function setLoading(on) {
        if (on) {
          connectBtn.classList.add('loading');
          connectBtn.disabled = true;
        } else {
          connectBtn.classList.remove('loading');
          connectBtn.disabled = false;
        }
      }

      // Wait for MusicKit to be ready, with timeout
      function waitForMusicKit(timeout) {
        return new Promise(function(resolve, reject) {
          if (window.MusicKit) {
            resolve();
            return;
          }
          var waited = 0;
          var interval = setInterval(function() {
            waited += 200;
            if (window.MusicKit) {
              clearInterval(interval);
              resolve();
            } else if (waited >= timeout) {
              clearInterval(interval);
              reject(new Error('MusicKit JS failed to load. Check your internet connection and try again.'));
            }
          }, 200);
        });
      }

      async function checkAuth() {
        try {
          var result = await sb.auth.getSession();
          currentSession = result.data.session;
          console.log('[Auth] Session:', currentSession ? 'signed in as ' + (currentSession.user.email || currentSession.user.id) : 'not signed in');
          if (!currentSession) {
            connectBtn.style.display = 'none';
            authPrompt.style.display = 'block';
          } else {
            connectBtn.style.display = 'block';
            authPrompt.style.display = 'none';
          }
        } catch (err) {
          console.error('[Auth] Error checking session:', err);
        }
      }

      signinBtn.addEventListener('click', async function() {
        console.log('[Auth] Starting Apple sign in...');
        var result = await sb.auth.signInWithOAuth({ provider: 'apple' });
        if (result.error) {
          console.error('[Auth] Sign in error:', result.error);
          showStatus('error', result.error.message);
        }
      });

      sb.auth.onAuthStateChange(function(event, session) {
        console.log('[Auth] State changed:', event);
        currentSession = session;
        if (session) {
          connectBtn.style.display = 'block';
          authPrompt.style.display = 'none';
        }
      });

      connectBtn.addEventListener('click', async function() {
        if (!currentSession) {
          showStatus('error', 'Please sign in first.');
          return;
        }

        setLoading(true);

        try {
          // Step 1: Wait for MusicKit JS to be loaded
          showStatus('info', 'Loading MusicKit...');
          console.log('[MusicKit] Waiting for MusicKit JS...');
          await waitForMusicKit(15000);
          console.log('[MusicKit] MusicKit JS is ready');

          // Step 2: Get developer token from edge function
          showStatus('info', 'Fetching developer token...');
          console.log('[Token] Calling apple-music-dev-token...');

          var dtRes = await fetch(SUPA_URL + '/functions/v1/apple-music-dev-token', {
            headers: {
              'Authorization': 'Bearer ' + currentSession.access_token,
              'apikey': SUPA_KEY
            }
          });

          console.log('[Token] Response status:', dtRes.status);

          if (!dtRes.ok) {
            var dtErrText = await dtRes.text();
            console.error('[Token] Error response:', dtErrText);
            try {
              var dtErr = JSON.parse(dtErrText);
              throw new Error(dtErr.error || 'Developer token failed (status ' + dtRes.status + ')');
            } catch (e) {
              if (e.message.indexOf('Developer token') !== -1) throw e;
              throw new Error('Developer token failed (status ' + dtRes.status + '): ' + dtErrText);
            }
          }

          var dtData = await dtRes.json();
          var devToken = dtData.token;
          console.log('[Token] Got developer token, length:', devToken.length);

          // Step 3: Configure MusicKit
          showStatus('info', 'Configuring MusicKit...');
          console.log('[MusicKit] Configuring...');

          await MusicKit.configure({
            developerToken: devToken,
            app: { name: 'Music Tracker', build: '1.0.0' }
          });

          var music = MusicKit.getInstance();
          console.log('[MusicKit] Instance ready, requesting authorization...');

          // Step 4: Authorize — this opens the Apple Music permission popup
          showStatus('info', 'Requesting Apple Music access...');

          var musicUserToken = await music.authorize();
          console.log('[MusicKit] Got user token, length:', musicUserToken ? musicUserToken.length : 0);

          if (!musicUserToken) {
            throw new Error('Authorization was cancelled');
          }

          // Step 5: Save the token
          showStatus('info', 'Saving connection...');
          console.log('[Save] Calling save-apple-music-token...');

          var saveRes = await fetch(SUPA_URL + '/functions/v1/save-apple-music-token', {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer ' + currentSession.access_token,
              'apikey': SUPA_KEY,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ music_user_token: musicUserToken })
          });

          console.log('[Save] Response status:', saveRes.status);

          if (!saveRes.ok) {
            var saveErrText = await saveRes.text();
            console.error('[Save] Error response:', saveErrText);
            try {
              var saveErr = JSON.parse(saveErrText);
              throw new Error(saveErr.error || 'Failed to save token');
            } catch (e) {
              if (e.message.indexOf('save') !== -1 || e.message.indexOf('Failed') !== -1) throw e;
              throw new Error('Failed to save token: ' + saveErrText);
            }
          }

          console.log('[Done] Apple Music connected successfully!');
          connectBtn.style.display = 'none';
          connectedBadge.style.display = 'flex';
          showStatus('success', 'Apple Music connected! Your listening history will start syncing shortly.');

        } catch (err) {
          console.error('[Error]', err);
          if (err.message && (err.message.indexOf('cancelled') !== -1 || err.message.indexOf('denied') !== -1)) {
            showStatus('error', 'Authorization was cancelled. Try again when ready.');
          } else {
            showStatus('error', err.message || 'Something went wrong. Please try again.');
          }
        } finally {
          setLoading(false);
        }
      });

      checkAuth();
    })();
  </script>
</body>
</html>
